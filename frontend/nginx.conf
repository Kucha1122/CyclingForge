# Maps the Upgrade request header so WebSocket connections (SignalR /api/hubs/sync)
# get `Connection: upgrade`, while normal requests get `Connection: close`.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://cyclingforge-backend:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support for the SignalR sync hub (/api/hubs/sync).
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Keep long-lived hub connections (WebSocket / long-polling) from being closed early.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
