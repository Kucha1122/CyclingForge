apiVersion: apps/v1
kind: Deployment
metadata:
  name: cyclingforge-frontend
  namespace: cyclingforge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cyclingforge-frontend
  template:
    metadata:
      labels:
        app: cyclingforge-frontend
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: frontend
          image: ghcr.io/kucha1122/cyclingforge-frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: cyclingforge-frontend
  namespace: cyclingforge
spec:
  selector:
    app: cyclingforge-frontend
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cyclingforge-frontend
  namespace: cyclingforge
spec:
  ingressClassName: traefik
  rules:
    # No host: Traefik routes all traffic arriving from the Tailscale Funnel here.
    # TLS is terminated by Tailscale at the edge, so no cert-manager / TLS block needed.
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cyclingforge-frontend
                port:
                  number: 80
