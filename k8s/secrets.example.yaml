# Copy this file to secrets.yaml and fill in real values.
# DO NOT commit secrets.yaml to git (it is gitignored).
# Env-var double-underscore (__) maps to nested config keys (e.g. ConnectionStrings:UsersDb).
apiVersion: v1
kind: Secret
metadata:
  name: cyclingforge-secrets
  namespace: cyclingforge
type: Opaque
stringData:
  ConnectionStrings__UsersDb: "Server=192.168.50.202,1433;Database=CyclingForge_Users;User Id=sa;Password=CHANGEME;TrustServerCertificate=True;MultipleActiveResultSets=true"
  ConnectionStrings__StravaDb: "Server=192.168.50.202,1433;Database=CyclingForge_Strava;User Id=sa;Password=CHANGEME;TrustServerCertificate=True;MultipleActiveResultSets=true"
  ConnectionStrings__ActivitiesDb: "Server=192.168.50.202,1433;Database=CyclingForge_Activities;User Id=sa;Password=CHANGEME;TrustServerCertificate=True;MultipleActiveResultSets=true"
  ConnectionStrings__GarminDb: "Server=192.168.50.202,1433;Database=CyclingForge_Garmin;User Id=sa;Password=CHANGEME;TrustServerCertificate=True;MultipleActiveResultSets=true"
  ConnectionStrings__WorkoutsDb: "Server=192.168.50.202,1433;Database=CyclingForge_Workouts;User Id=sa;Password=CHANGEME;TrustServerCertificate=True;MultipleActiveResultSets=true"
  Auth__Issuer: "CyclingForge"
  Auth__Audience: "CyclingForge"
  Auth__SigningKey: "CHANGEME"
  Auth__ExpiryMinutes: "120"
