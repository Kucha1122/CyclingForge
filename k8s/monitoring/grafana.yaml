# Grafana — the panel. Auto-provisions Loki + Prometheus datasources and a
# CyclingForge overview dashboard. Served behind Traefik at /grafana (TLS handled
# by Tailscale Funnel at the edge, same as the frontend).
#
# The grafana-admin Secret is NOT defined here (kept out of git, like
# cyclingforge-secrets — see k8s/secrets.example.yaml). CI creates/updates it from
# the GRAFANA_ADMIN_PASSWORD GitHub secret before applying this file. For a manual
# first-time setup, create it yourself:
#   kubectl create secret generic grafana-admin -n monitoring \
#     --from-literal=admin-user=admin \
#     --from-literal=admin-password='<your-password>'
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
      - name: Loki
        uid: loki
        type: loki
        access: proxy
        url: http://loki:3100
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: monitoring
data:
  provider.yaml: |
    apiVersion: 1
    providers:
      - name: CyclingForge
        orgId: 1
        folder: CyclingForge
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring
data:
  overview.json: |
    {
      "title": "CyclingForge — Overview",
      "uid": "cyclingforge-overview",
      "tags": ["cyclingforge"],
      "timezone": "browser",
      "schemaVersion": 39,
      "time": { "from": "now-6h", "to": "now" },
      "refresh": "30s",
      "templating": { "list": [] },
      "panels": [
        {
          "type": "timeseries",
          "title": "Memory per pod (cyclingforge)",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "bytes" }, "overrides": [] },
          "targets": [
            {
              "expr": "sum by (pod) (container_memory_working_set_bytes{namespace=\"cyclingforge\", container!=\"\"})",
              "legendFormat": "{{pod}}"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "CPU per pod (cyclingforge)",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "short" }, "overrides": [] },
          "targets": [
            {
              "expr": "sum by (pod) (rate(container_cpu_usage_seconds_total{namespace=\"cyclingforge\", container!=\"\"}[5m]))",
              "legendFormat": "{{pod}}"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "HTTP request rate (backend)",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "reqps" }, "overrides": [] },
          "targets": [
            {
              "expr": "sum by (code) (rate(http_requests_received_total{app=\"cyclingforge-backend\"}[5m]))",
              "legendFormat": "{{code}}"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "HTTP request duration p95 (backend)",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "s" }, "overrides": [] },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum by (le) (rate(http_request_duration_seconds_bucket{app=\"cyclingforge-backend\"}[5m])))",
              "legendFormat": "p95"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Log volume by app",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "datasource": { "type": "loki", "uid": "loki" },
          "fieldConfig": { "defaults": { "unit": "short" }, "overrides": [] },
          "targets": [
            {
              "expr": "sum by (app) (count_over_time({namespace=\"cyclingforge\"}[1m]))",
              "legendFormat": "{{app}}"
            }
          ]
        },
        {
          "type": "logs",
          "title": "Errors (warn/error/client)",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "datasource": { "type": "loki", "uid": "loki" },
          "options": { "showTime": true, "wrapLogMessage": true, "sortOrder": "Descending" },
          "targets": [
            {
              "expr": "{namespace=\"cyclingforge\"} |~ \"(?i)error|warn|exception\""
            }
          ]
        }
      ]
    }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data
  namespace: monitoring
spec:
  storageClassName: local-path
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      securityContext:
        runAsUser: 472
        runAsGroup: 472
        fsGroup: 472
      containers:
        - name: grafana
          image: grafana/grafana:11.4.0
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: grafana-admin
                  key: admin-user
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-admin
                  key: admin-password
            - name: GF_SERVER_ROOT_URL
              value: "%(protocol)s://%(domain)s/grafana/"
            - name: GF_SERVER_SERVE_FROM_SUB_PATH
              value: "true"
            - name: GF_ANALYTICS_REPORTING_ENABLED
              value: "false"
            - name: GF_ANALYTICS_CHECK_FOR_UPDATES
              value: "false"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "384Mi"
              cpu: "300m"
          volumeMounts:
            - name: data
              mountPath: /var/lib/grafana
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: grafana-data
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: dashboards
          configMap:
            name: grafana-dashboards
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
spec:
  selector:
    app: grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  namespace: monitoring
spec:
  ingressClassName: traefik
  rules:
    # Served at /grafana — more specific than the frontend's "/" rule, so Traefik
    # routes it here. TLS terminated by Tailscale Funnel at the edge.
    - http:
        paths:
          - path: /grafana
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000
